<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Air Taxi Nepal - Launching Soon</title>
<style>
body{margin:0;background:#020617;color:white;font-family:Arial,sans-serif;overflow:hidden;display:flex;justify-content:center;align-items:center;height:100vh}
canvas{position:fixed;inset:0}
.card{position:relative;z-index:2;background:rgba(255,255,255,.08);backdrop-filter:blur(12px);padding:40px;border-radius:24px;text-align:center;max-width:800px;width:90%}
h1{font-size:4rem;margin:0;background:linear-gradient(90deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.count{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.box{background:rgba(255,255,255,.08);padding:12px 18px;border-radius:12px}
.num{font-size:2rem;font-weight:bold;color:#60a5fa}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="card">
<h1>Air Taxi Nepal</h1>
<h2>Launching Soon</h2>
<p>Our new flight booking platform is preparing for takeoff.</p>
<div class="count">
<div class="box"><div id="d" class="num">40</div>Days</div>
<div class="box"><div id="h" class="num">00</div>Hours</div>
<div class="box"><div id="m" class="num">00</div>Minutes</div>
<div class="box"><div id="s" class="num">00</div>Seconds</div>
</div>
<p>📞 +977 9713601159<br>🌐 www.airtaxinepal.org</p>
</div>
<script>
const launch=new Date();launch.setDate(launch.getDate()+40);
setInterval(()=>{
const n=new Date(),x=launch-n;
document.getElementById('d').textContent=Math.floor(x/86400000);
document.getElementById('h').textContent=Math.floor(x%86400000/3600000);
document.getElementById('m').textContent=Math.floor(x%3600000/60000);
document.getElementById('s').textContent=Math.floor(x%60000/1000);
},1000);
const c=document.getElementById('c'),ctx=c.getContext('2d');
function r(){c.width=innerWidth;c.height=innerHeight}r();onresize=r;
const stars=[...Array(700)].map(()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,s:Math.random()*2+0.2,v:Math.random()+0.2}));
(function a(){
ctx.fillStyle='#020617';ctx.fillRect(0,0,c.width,c.height);
stars.forEach(st=>{ctx.fillStyle='white';ctx.fillRect(st.x,st.y,st.s,st.s);st.y+=st.v;if(st.y>c.height){st.y=0;st.x=Math.random()*c.width;}});
requestAnimationFrame(a);
})();
</script>
</body>
</html>
